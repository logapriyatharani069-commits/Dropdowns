<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Cards with Dropdowns</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 CSS & JS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <style>
    body {
      background: #f4f6f9;
      padding: 20px;
    }
    h2 {
      margin-top: 40px;
      color: #333;
    }
  </style>
</head>
<body>

<div class="container">

  <h1 class="text-center mb-4">💳 Bootstrap Cards with Dropdowns</h1>

  <!-- Standalone Dropdown -->
  <h2>Standalone Dropdown</h2>
  <div class="dropdown mb-4">
    <button class="btn btn-primary dropdown-toggle" type="button" id="dropdownMenuButton1" data-toggle="dropdown">
      Select Option
    </button>
    <div class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
      <a class="dropdown-item" href="#">Option 1</a>
      <a class="dropdown-item" href="#">Option 2</a>
      <a class="dropdown-item" href="#">Option 3</a>
    </div>
  </div>

  <!-- Dropdown inside a card -->
  <h2>Dropdown inside Card</h2>
  <div class="card p-3 mb-3 bg-light border-info" style="width: 18rem;">
    <h5 class="card-title text-info">Card with Dropdown</h5>
    <p class="card-text">Choose an option from the dropdown below:</p>
    <div class="dropdown">
      <button class="btn btn-success dropdown-toggle" type="button" id="dropdownMenuButton2" data-toggle="dropdown">
        Select Option
      </button>
      <div class="dropdown-menu" aria-labelledby="dropdownMenuButton2">
        <a class="dropdown-item" href="#">Option A</a>
        <a class="dropdown-item" href="#">Option B</a>
        <a class="dropdown-item" href="#">Option C</a>
      </div>
    </div>
  </div>

  <!-- Colorful Dropdown Buttons -->
  <h2>Colorful Dropdown Buttons</h2>
  <div class="btn-group mb-3">
    <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">Primary</button>
    <div class="dropdown-menu">
      <a class="dropdown-item" href="#">Action 1</a>
      <a class="dropdown-item" href="#">Action 2</a>
    </div>
  </div>

  <div class="btn-group mb-3">
    <button class="btn btn-success dropdown-toggle" data-toggle="dropdown">Success</button>
    <div class="dropdown-menu">
      <a class="dropdown-item" href="#">Action 1</a>
      <a class="dropdown-item" href="#">Action 2</a>
    </div>
  </div>

  <div class="btn-group mb-3">
    <button class="btn btn-warning dropdown-toggle" data-toggle="dropdown">Warning</button>
    <div class="dropdown-menu">
      <a class="dropdown-item" href="#">Action 1</a>
      <a class="dropdown-item" href="#">Action 2</a>
    </div>
  </div>

</div>

</body>
</html>
